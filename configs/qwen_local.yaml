# Qwen réel servi par vLLM (endpoint OpenAI-compatible). Cf. scripts/serve_qwen_vllm.sh
# et specs/04-runpod-qwen.md pour le lancement sur RunPod.
#
# La politique ET le world-model (Phase 1 : LLM-as-world-model) pointent sur le même
# serveur Qwen. base_url à adapter (localhost si tout est sur le même pod).

policy:
  kind: openai
  model: Qwen/Qwen3-32B-AWQ      # cible single-GPU 24 Go. Variante débit : Qwen/Qwen3-Coder-30B-A3B
  base_url: http://localhost:8000/v1
  api_key_env: null               # vLLM local n'exige pas de clé
  temperature: 0.7
  max_tokens: 512
  # Qwen3 : désactiver le mode "thinking" (plus rapide/déterministe ; notre parseur strip
  # de toute façon les blocs <think>). Commenter pour réactiver le raisonnement.
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

world_model:
  kind: openai
  model: Qwen/Qwen3-32B-AWQ
  base_url: http://localhost:8000/v1
  api_key_env: null
  temperature: 0.3
  max_tokens: 256
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

orchestrator:
  k_candidates: 4
  horizon: 3
  max_turns: 12
  # surprise_threshold : non fixé ⇒ WorldModel (Jaccard) = 0.5, valeur historique Phase 1.
  use_world_model: true
  concurrency: 8            # rollouts concurrents → vLLM batche (indispensable vs séquentiel)

eval:
  env: mock                       # étape 1 : valider Qwen sur le mock avant de passer à tau2
  domain: retail
  tasks: 30
  turn_buckets: [4, 8, 12]
  seed: 0
  out_dir: runs/qwen_mock
