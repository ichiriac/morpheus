# Sanity RAPIDE du world-model sur le mock avec Qwen réel.
# But : confirmer que le chemin world-model tourne SANS erreur, en quelques secondes.
# PAS une mesure (le mock est trop simple pour départager baseline vs WM).
#
# Coût/tour ≈ 3 + K·(3H−1). Ici K=2, H=1 → ~5 appels/tour, lancés en parallèle (concurrency).

policy:
  kind: openai
  model: Qwen/Qwen3-32B-AWQ
  base_url: http://localhost:8000/v1
  api_key_env: null
  temperature: 0.3            # plus déterministe pour un sanity
  max_tokens: 256
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

world_model:
  kind: openai
  model: Qwen/Qwen3-32B-AWQ
  base_url: http://localhost:8000/v1
  api_key_env: null
  temperature: 0.0
  max_tokens: 48             # predict = 1 phrase, score = "SCORE: n" → tokens serrés
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

orchestrator:
  k_candidates: 2            # K réduit
  horizon: 1                 # H=1 : lookahead à 1 pas (le plus court)
  max_turns: 8
  # surprise_threshold : non fixé ⇒ WorldModel (Jaccard) = 0.5, valeur historique Phase 1.
  use_world_model: true
  concurrency: 4             # rollouts concurrents → vLLM batche

eval:
  env: mock
  domain: retail
  tasks: 3                  # 3 tâches suffisent pour un sanity
  turn_buckets: [4]
  seed: 0
  out_dir: runs/qwen_wm_fast
