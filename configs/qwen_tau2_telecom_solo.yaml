# Smoke τ²-bench en mode SOLO (telecom) : l'agent travaille seul (DummyUser, hors-ligne),
# aucun 2ᵉ LLM user-sim requis. But : valider la boucle morpheus de bout en bout contre le
# vrai benchmark. NB : les tâches telecom-solo sont courtes (0–2 actions agent) → courbe
# vs-tours plate ; la vraie mesure de la thèse (8+ tours) se fera sur retail (voir qwen_tau2.yaml).
#
# Prérequis : serveur vLLM Qwen up (scripts/serve_qwen_vllm.sh).

policy:
  kind: openai
  model: Qwen/Qwen3-32B-AWQ
  base_url: http://localhost:8000/v1
  api_key_env: null
  temperature: 0.3
  max_tokens: 256
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

world_model:
  kind: openai
  model: Qwen/Qwen3-32B-AWQ
  base_url: http://localhost:8000/v1
  api_key_env: null
  temperature: 0.0
  max_tokens: 48
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

orchestrator:
  k_candidates: 2
  horizon: 1
  max_turns: 6
  surprise_threshold: 0.5
  use_world_model: true
  concurrency: 4

eval:
  env: tau2
  domain: telecom
  tau2_solo: true
  tau2_max_steps: 16
  tasks: 3
  seed: 0
  out_dir: runs/qwen_tau2_telecom_solo
