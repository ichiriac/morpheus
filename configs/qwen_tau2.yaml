# τ²-bench RETAIL — cible réelle de la Phase 1 (courbe réussite-vs-tours, divergence à 8+ tours).
# Retail n'a pas de tickets → mode NON-solo : l'utilisateur est simulé par un LLM. Ici on
# pointe le user-sim sur le MÊME serveur vLLM Qwen (litellm, endpoint OpenAI-compatible) pour
# rester single-GPU. base_url à adapter si le serveur est ailleurs.
#
# ⚠️ LIMITE CONNUE (voir TODO étape 2) : la politique de morpheus n'émet que des appels
# d'outils, pas de messages texte à l'utilisateur. Les tâches retail exigeant un vrai dialogue
# (demander l'id de commande, confirmer…) seront pénalisées tant que l'orchestrateur n'a pas
# une action « répondre à l'utilisateur ». Le pipeline tourne, mais la mesure n'est PAS encore
# équitable. C'est le prochain sous-chantier.
#
# Prérequis : serveur vLLM Qwen up (scripts/serve_qwen_vllm.sh).

policy:
  kind: openai
  model: Qwen/Qwen3-32B-AWQ
  base_url: http://localhost:8000/v1
  api_key_env: null
  temperature: 0.7
  max_tokens: 512
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

world_model:
  kind: openai
  model: Qwen/Qwen3-32B-AWQ
  base_url: http://localhost:8000/v1
  api_key_env: null
  temperature: 0.3
  max_tokens: 256
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

orchestrator:
  k_candidates: 4
  horizon: 3
  max_turns: 16
  surprise_threshold: 0.5
  use_world_model: true
  concurrency: 8

eval:
  env: tau2
  domain: retail
  tau2_solo: false
  tau2_max_steps: 40
  # user-sim sur le vLLM Qwen local (litellm : préfixe openai/ + api_base).
  tau2_user_llm: openai/Qwen/Qwen3-32B-AWQ
  tau2_user_base_url: http://localhost:8000/v1
  tau2_user_api_key_env: null
  tasks: 30
  turn_buckets: [4, 8, 12]
  seed: 0
  out_dir: runs/qwen_tau2_retail
