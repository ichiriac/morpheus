# τ²-bench RETAIL — cible réelle de la Phase 1 (courbe réussite-vs-tours, divergence à 8+ tours).
# Retail n'a pas de tickets → mode NON-solo : l'utilisateur est simulé par un LLM. Ici on
# pointe le user-sim sur le MÊME serveur vLLM Qwen (litellm, endpoint OpenAI-compatible) pour
# rester single-GPU. base_url à adapter si le serveur est ailleurs.
#
# NOTE (2026-07-15) : l'avertissement « la politique n'émet que des appels d'outils, pas de
# messages texte » qui vivait ici était PÉRIMÉ. Il datait de l'étape 2 (commit 9d90121, 12:02) ;
# `respond_to_user` a été livré à 12:26 le même jour (commit 7d6349d, étape 3 partie 1). L'outil
# est exposé par l'adaptateur en mode non-solo (`tau2_adapter.py:71`) et `step()` intercepte
# l'action pour router le TEXTE vers le simulateur d'utilisateur (`tau2_adapter.py:109`).
# Mesuré, pas supposé : 44 des 108 tours annotés (41%) sont des `respond_to_user`
# (`data/annotations/tau2_error_novelty.jsonl`) — le dialogue marche.
# ⚠️ La vraie limite des runs retail du 13/07 était AILLEURS : le juge NL n'a été câblé qu'à
# 19:43 (commit 1158aa0). Avant ça le défaut τ² était `gpt-4.1` → 404 → composante NL = 0, et
# 112/114 tâches retail ont une NL_ASSERTION dans `reward_basis` ⇒ reward = db × 0 = 0 PAR
# CONSTRUCTION, quoi que l'agent fasse. Cf. BENCHMARKS.md (lignes retail marquées ⚠️ pré-juge).
#
# Prérequis : serveur vLLM Qwen up (scripts/serve_qwen_vllm.sh).

policy:
  kind: openai
  model: Qwen/Qwen3-32B-AWQ
  base_url: http://localhost:8000/v1
  api_key_env: null
  temperature: 0.7
  max_tokens: 512
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

world_model:
  kind: openai
  model: Qwen/Qwen3-32B-AWQ
  base_url: http://localhost:8000/v1
  api_key_env: null
  temperature: 0.3
  max_tokens: 256
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

orchestrator:
  k_candidates: 4
  horizon: 3
  max_turns: 16
  # surprise_threshold : non fixé ⇒ WorldModel (Jaccard) = 0.5, valeur historique Phase 1.
  use_world_model: true
  concurrency: 8

eval:
  env: tau2
  domain: retail
  tau2_solo: false
  tau2_max_steps: 40
  # user-sim sur le vLLM Qwen local (litellm : préfixe openai/ + api_base).
  tau2_user_llm: openai/Qwen/Qwen3-32B-AWQ
  tau2_user_base_url: http://localhost:8000/v1
  tau2_user_api_key_env: null
  # Juge des NL-assertions (reward retail) sur le MÊME vLLM local — sinon défaut gpt-4.1 → 404,
  # reward = 0 pour 112/114 tâches. ⚠️ Qwen jugeant Qwen : mesure indicative, pas de référence.
  tau2_judge_llm: openai/Qwen/Qwen3-32B-AWQ
  tau2_judge_base_url: http://localhost:8000/v1
  tau2_judge_api_key_env: null
  tasks: 30
  turn_buckets: [4, 8, 12]
  seed: 0
  out_dir: runs/qwen_tau2_retail
